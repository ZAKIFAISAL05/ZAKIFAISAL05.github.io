<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — GAME OVER | Grid Survival</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

        /* ── VARIABLES (sama dengan tema utama) ── */
        :root {
            --c-green:      #2ecc71;
            --c-yellow:     #f1c40f;
            --c-red:        #e74c3c;
            --c-purple:     #9b59b6;
            --c-pink:       #e91e8c;
            --c-cyan:       #1abc9c;

            --bg-main:      #1a1d2e;
            --bg-card:      #252840;

            --text-dark:    #ecf0f1;
            --text-muted:   #aaa;

            --border-r:     16px;
            --border-r-sm:  10px;
            --shadow:       4px 6px 0px rgba(0,0,0,0.4);
            --shadow-hover: 6px 8px 0px rgba(0,0,0,0.5);

            --font-title:   'Fredoka One', cursive;
            --font-body:    'Nunito', sans-serif;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-main);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* ── ANIMATED BG PARTICLES ── */
        .bg-pixels {
            position: fixed; inset: 0;
            pointer-events: none; overflow: hidden;
        }
        .px {
            position: absolute;
            width: 6px; height: 6px;
            border-radius: 2px;
            opacity: 0;
            animation: floatPx linear infinite;
        }
        @keyframes floatPx {
            0%   { opacity: 0; transform: translateY(100vh) rotate(0deg); }
            10%  { opacity: 0.5; }
            90%  { opacity: 0.2; }
            100% { opacity: 0; transform: translateY(-20px) rotate(360deg); }
        }

        /* ── MAIN CONTAINER ── */
        .container {
            position: relative; z-index: 10;
            text-align: center;
            padding: 24px 20px;
            max-width: 680px; width: 100%;
        }

        /* ── 404 GLITCH TEXT ── */
        .glitch-wrap { position: relative; margin-bottom: 6px; }

        .err-404 {
            font-family: var(--font-title);
            font-size: clamp(56px, 14vw, 108px);
            color: var(--c-red);
            text-shadow: 4px 4px 0 rgba(0,0,0,0.4), 0 0 30px rgba(231,76,60,0.4);
            display: inline-block;
            animation: glitch 2.5s infinite;
            position: relative;
        }
        .err-404::before,
        .err-404::after { content: '404'; position: absolute; top: 0; left: 0; width: 100%; }
        .err-404::before {
            color: var(--c-cyan);
            animation: glitchB 2.5s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 38%, 0 38%);
            opacity: 0.6;
        }
        .err-404::after {
            color: var(--c-purple);
            animation: glitchC 2.5s infinite;
            clip-path: polygon(0 62%, 100% 62%, 100% 100%, 0 100%);
            opacity: 0.6;
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: none; }
            91% { transform: skewX(-2deg) translateX(-3px); }
            92% { transform: skewX(2deg) translateX(3px); }
            93% { transform: none; }
        }
        @keyframes glitchB {
            0%, 90%, 100% { transform: none; }
            91% { transform: translateX(-6px); }
            92% { transform: translateX(5px); }
            93% { transform: none; }
        }
        @keyframes glitchC {
            0%, 90%, 100% { transform: none; }
            91% { transform: translateX(6px); }
            92% { transform: translateX(-5px); }
            93% { transform: none; }
        }

        /* ── GAME OVER TEXT ── */
        .game-over {
            font-family: var(--font-title);
            font-size: clamp(14px, 3.5vw, 22px);
            color: var(--c-yellow);
            letter-spacing: 4px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
            animation: blink 1.3s steps(1) infinite;
            margin-bottom: 24px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* ── PIXEL CHARACTER STAGE ── */
        .stage {
            display: flex; align-items: flex-end; justify-content: center;
            margin: 16px auto; height: 130px; position: relative;
            background: linear-gradient(to bottom, transparent 80%, rgba(155,89,182,0.08) 100%);
            border-bottom: 3px solid rgba(155,89,182,0.2);
            border-radius: 0 0 8px 8px;
        }
        canvas#character { image-rendering: pixelated; image-rendering: crisp-edges; }

        /* ── PROGRESS BAR ── */
        .progress-wrap { margin: 18px auto 20px; max-width: 420px; }

        .progress-label {
            font-family: var(--font-body);
            font-size: 0.78em;
            font-weight: 700;
            color: var(--text-muted);
            text-align: left;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .progress-bar {
            height: 14px;
            border: 3px solid rgba(231,76,60,0.4);
            border-radius: 8px;
            background: var(--bg-card);
            position: relative; overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0;
            border-radius: 6px;
            background: linear-gradient(90deg, var(--c-red), var(--c-pink));
            animation: fill404 2s ease-out forwards 0.4s;
            box-shadow: 0 0 10px rgba(231,76,60,0.4);
        }
        @keyframes fill404 { to { width: 100%; } }

        /* ── MESSAGE BOX ── */
        .msg-box {
            background: var(--bg-card);
            border: 3px solid rgba(155,89,182,0.35);
            border-radius: var(--border-r);
            box-shadow: var(--shadow);
            padding: 20px 24px;
            margin: 0 auto 24px;
            max-width: 500px;
            text-align: left;
            position: relative;
        }
        .msg-box::before {
            content: '▌ SYSTEM LOG';
            position: absolute;
            top: -12px; left: 16px;
            background: var(--bg-card);
            padding: 0 8px;
            font-family: var(--font-title);
            font-size: 0.75em;
            color: var(--c-purple);
            letter-spacing: 1px;
        }

        .msg-line {
            font-size: 0.95em;
            font-weight: 600;
            color: var(--c-green);
            line-height: 1.7;
            margin-bottom: 2px;
        }
        .msg-line .dim  { color: var(--text-muted); }
        .msg-line .warn { color: var(--c-yellow); }
        .msg-line .err  { color: var(--c-red); }

        /* ── BUTTONS ── */
        .btn-group {
            display: flex; gap: 14px;
            justify-content: center; flex-wrap: wrap;
        }

        .btn-home {
            font-family: var(--font-title);
            font-size: clamp(0.85em, 2vw, 1em);
            background: var(--c-purple);
            color: #fff;
            border: 3px solid var(--c-purple);
            border-radius: var(--border-r-sm);
            box-shadow: var(--shadow);
            padding: 13px 24px;
            text-decoration: none;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.1s, box-shadow 0.1s, background 0.15s;
            letter-spacing: 0.5px;
        }
        .btn-home:hover {
            background: var(--c-pink);
            border-color: var(--c-pink);
            box-shadow: var(--shadow-hover);
            transform: translate(-2px, -2px);
        }
        .btn-home.secondary {
            background: transparent;
            color: var(--c-cyan);
            border-color: var(--c-cyan);
        }
        .btn-home.secondary:hover {
            background: var(--c-cyan);
            border-color: var(--c-cyan);
            color: #fff;
        }

        /* ── FOOTER NOTE ── */
        .footer-note {
            font-size: 0.82em;
            color: var(--text-muted);
            margin-top: 22px;
            font-weight: 600;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            .btn-group { flex-direction: column; align-items: center; }
            .btn-home { width: 230px; text-align: center; }
        }
    </style>
</head>
<body>

<!-- Floating pixel bg -->
<div class="bg-pixels" id="bgPixels"></div>

<div class="container">

    <!-- 404 Title -->
    <div class="glitch-wrap">
        <div class="err-404">404</div>
    </div>
    <div class="game-over">— GAME OVER —</div>

    <!-- Pixel character animation canvas -->
    <div class="stage">
        <canvas id="character" width="160" height="120"></canvas>
    </div>

    <!-- Progress / loading bar -->
    <div class="progress-wrap">
        <div class="progress-label">Loading Page... Fatal Error</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>

    <!-- Message box -->
    <div class="msg-box">
        <div class="msg-line"><span class="dim">$</span> GET /page-not-found</div>
        <div class="msg-line"><span class="err">ERR:</span> 404 — Halaman tidak ditemukan</div>
        <div class="msg-line"><span class="warn">INF:</span> Zombie mungkin sudah memakannya.</div>
        <div class="msg-line"><span class="dim">$</span> Kembali ke base camp...</div>
    </div>

    <!-- Action buttons -->
    <div class="btn-group">
        <a href="/" class="btn-home">▶ RESPAWN (HOME)</a>
        <a href="/#games" class="btn-home secondary">▶ LIHAT GAMES</a>
    </div>

    <div class="footer-note">grid-survival.netlify.app &nbsp;|&nbsp; © 2025 Grid Survival</div>
</div>

<script>
/* ── FLOATING PIXELS ── */
const bg = document.getElementById('bgPixels');
for (let i = 0; i < 28; i++) {
    const px = document.createElement('div');
    px.className = 'px';
    const colors = ['#9b59b6','#e91e8c','#1abc9c','#f1c40f','#e74c3c'];
    px.style.cssText = `
        left: ${Math.random()*100}%;
        background: ${colors[Math.floor(Math.random()*colors.length)]};
        width: ${[4,6,8][Math.floor(Math.random()*3)]}px;
        height: ${[4,6,8][Math.floor(Math.random()*3)]}px;
        animation-duration: ${4 + Math.random()*8}s;
        animation-delay: ${Math.random()*6}s;
    `;
    bg.appendChild(px);
}

/* ── PIXEL CHARACTER ANIMATION ── */
const canvas = document.getElementById('character');
const ctx = canvas.getContext('2d');
const SCALE = 5;

const C = {
    _: null, S: '#f5c88a', H: '#5a3e1b', G: '#2a7a3a', T: '#1a5a2a',
    R: '#c86fdf', B: '#3a2a1a', D: '#8b6b4a', W: '#e0e0e0',
    X: '#e74c3c', Y: '#f1c40f', N: '#1a1d2e',
};

const frames = [
    [
        [C._,C.N,C.N,C.N,C.N,C.N,C._,C._],
        [C.N,C.H,C.H,C.S,C.H,C.H,C.N,C._],
        [C.N,C.S,C.R,C.S,C.S,C.H,C.N,C._],
        [C.N,C.S,C.S,C.S,C.S,C.S,C.N,C._],
        [C.N,C.S,C.S,C.S,C.S,C.S,C.N,C._],
        [C._,C.N,C.N,C.N,C.N,C.N,C._,C._],
        [C.N,C.G,C.G,C.G,C.G,C.G,C.N,C._],
        [C.N,C.G,C.X,C.G,C.G,C.G,C.N,C._],
        [C.N,C.T,C.G,C.G,C.G,C.T,C.N,C._],
        [C._,C.N,C.N,C.N,C.N,C.N,C._,C._],
        [C._,C.N,C.B,C.N,C.N,C.B,C.N,C._],
        [C._,C.N,C.D,C.N,C.N,C.D,C.N,C._],
        [C.N,C.D,C.N,C._,C._,C.N,C.B,C.N],
        [C.N,C.B,C.N,C._,C._,C.N,C.N,C.N],
    ],
    [
        [C._,C.N,C.N,C.N,C.N,C.N,C._,C._],
        [C.N,C.H,C.H,C.S,C.H,C.H,C.N,C._],
        [C.N,C.S,C.S,C.S,C.R,C.H,C.N,C._],
        [C.N,C.S,C.S,C.S,C.S,C.S,C.N,C._],
        [C.N,C.S,C.S,C.S,C.S,C.S,C.N,C._],
        [C._,C.N,C.N,C.N,C.N,C.N,C._,C._],
        [C.N,C.G,C.G,C.G,C.G,C.G,C.N,C._],
        [C.N,C.G,C.G,C.X,C.G,C.G,C.N,C._],
        [C.N,C.T,C.G,C.G,C.G,C.T,C.N,C._],
        [C._,C.N,C.N,C.N,C.N,C.N,C._,C._],
        [C._,C.N,C.B,C.N,C.N,C.B,C.N,C._],
        [C._,C.N,C.D,C.N,C.N,C.D,C.N,C._],
        [C._,C._,C.N,C.B,C.N,C._,C.N,C._],
        [C._,C._,C.N,C.N,C.N,C._,C._,C._],
    ]
];

const Z = {
    _: null, S: '#7aad70', H: '#2a3a1a', G: '#3a3a3a', T: '#252525',
    R: '#e74c3c', B: '#2a1a1a', D: '#4a3a2a', N: '#1a1d2e', X: '#884444',
};
const zombieFrames = [
    [
        [Z._,Z.N,Z.N,Z.N,Z.N,Z.N,Z._,Z._],
        [Z.N,Z.H,Z.H,Z.S,Z.H,Z.H,Z.N,Z._],
        [Z.N,Z.S,Z.R,Z.S,Z.S,Z.H,Z.N,Z._],
        [Z.N,Z.S,Z.S,Z.S,Z.S,Z.S,Z.N,Z._],
        [Z.N,Z.S,Z.S,Z.X,Z.S,Z.S,Z.N,Z._],
        [Z._,Z.N,Z.N,Z.N,Z.N,Z.N,Z._,Z._],
        [Z.N,Z.G,Z.G,Z.G,Z.G,Z.G,Z.N,Z._],
        [Z.N,Z.T,Z.G,Z.G,Z.G,Z.T,Z.N,Z._],
        [Z.N,Z.T,Z.T,Z.G,Z.T,Z.T,Z.N,Z._],
        [Z._,Z.N,Z.N,Z.N,Z.N,Z.N,Z._,Z._],
        [Z._,Z.N,Z.B,Z.N,Z.N,Z.B,Z.N,Z._],
        [Z._,Z.N,Z.D,Z.N,Z.N,Z.D,Z.N,Z._],
        [Z.N,Z.D,Z.N,Z._,Z.N,Z.D,Z.N,Z._],
        [Z.N,Z.B,Z.N,Z._,Z.N,Z.N,Z._,Z._],
    ],
    [
        [Z._,Z.N,Z.N,Z.N,Z.N,Z.N,Z._,Z._],
        [Z.N,Z.H,Z.H,Z.S,Z.H,Z.H,Z.N,Z._],
        [Z.N,Z.S,Z.S,Z.S,Z.R,Z.H,Z.N,Z._],
        [Z.N,Z.S,Z.S,Z.S,Z.S,Z.S,Z.N,Z._],
        [Z.N,Z.X,Z.S,Z.S,Z.S,Z.S,Z.N,Z._],
        [Z._,Z.N,Z.N,Z.N,Z.N,Z.N,Z._,Z._],
        [Z.N,Z.G,Z.G,Z.G,Z.G,Z.G,Z.N,Z._],
        [Z.N,Z.T,Z.G,Z.G,Z.T,Z.G,Z.N,Z._],
        [Z.N,Z.T,Z.T,Z.G,Z.T,Z.T,Z.N,Z._],
        [Z._,Z.N,Z.N,Z.N,Z.N,Z.N,Z._,Z._],
        [Z._,Z.N,Z.B,Z.N,Z.N,Z.B,Z.N,Z._],
        [Z._,Z.N,Z.D,Z.N,Z.N,Z.D,Z.N,Z._],
        [Z._,Z._,Z.N,Z.B,Z.N,Z._,Z.N,Z._],
        [Z._,Z._,Z.N,Z.N,Z.N,Z._,Z._,Z._],
    ]
];

function drawSprite(frameData, offsetX, offsetY, scale) {
    frameData.forEach((row, ry) => {
        row.forEach((color, rx) => {
            if (!color) return;
            ctx.fillStyle = color;
            ctx.fillRect(offsetX + rx * scale, offsetY + ry * scale, scale, scale);
        });
    });
}

let frame = 0;
let survivorX = -50;
let zombieX = canvas.width + 50;
const SURVIVOR_Y = 10;
const ZOMBIE_Y = 10;
const SPEED = 1.2;
const ZOMBIE_SPEED = 0.7;

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    survivorX += SPEED;
    if (survivorX > canvas.width + 50) survivorX = -50;

    zombieX += ZOMBIE_SPEED;
    if (zombieX > canvas.width + 50) zombieX = -80;

    ctx.fillStyle = 'rgba(155,89,182,0.15)';
    ctx.fillRect(0, canvas.height - 4, canvas.width, 2);

    const f = Math.floor(frame / 8) % 2;
    drawSprite(zombieFrames[f], Math.floor(zombieX), ZOMBIE_Y, SCALE - 1);
    drawSprite(frames[f], Math.floor(survivorX), SURVIVOR_Y, SCALE);

    frame++;
    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
