<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Service — Grid Survival</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
    <a href="../" class="topbar-back" aria-label="Kembali">←</a>
    <div class="topbar-avatar">
        <img src="../assets/img/studio_logo.png" alt="Grid Survival CS">
    </div>
    <div class="topbar-info">
        <span class="topbar-name">Grid CS Bot</span>
        <span class="topbar-status">
            <span class="status-dot"></span>
            Online · Siap membantu
        </span>
    </div>
    <div class="topbar-actions">
        <button class="topbar-btn" id="btn-tts" title="TTS Aktif">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </button>
        <button class="topbar-btn" id="btn-sound" title="Suara Aktif">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
        </button>
        <button class="topbar-btn" id="btn-report-top" title="Lapor Bug / Saran">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
        </button>
    </div>
</div>

<!-- CHAT MESSAGES -->
<div class="chat-wrap">
    <div class="messages" id="messages">
        <div class="date-sep">Hari ini</div>
    </div>

    <div id="quick-area">
        <div class="quick-section" id="quick-chips"></div>
        <div class="report-cards" id="report-cards-area">
            <div class="report-card" id="btn-open-bug">
                <span class="report-card-icon-svg">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                </span>
                <span class="report-card-label">Lapor Bug</span>
                <span class="report-card-sub">Ada error di game?</span>
            </div>
            <div class="report-card" id="btn-open-saran">
                <span class="report-card-icon-svg">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </span>
                <span class="report-card-label">Kirim Saran</span>
                <span class="report-card-sub">Punya ide keren?</span>
            </div>
        </div>
    </div>
</div>

<!-- LIHAT SEMUA GAME BAR -->
<div class="see-all-bar">
    <a href="../#games" class="see-all-btn">Lihat Semua Game</a>
</div>

<!-- INPUT AREA (preview + input dalam satu wrapper) -->
<div class="input-area-wrap">

    <!-- Preview file yang mau dikirim -->
    <div class="upload-preview-bar" id="upload-preview-bar" style="display:none;">
        <div class="upload-preview-inner" id="upload-preview-inner"></div>
        <button class="upload-clear-btn" id="upload-clear-btn" title="Hapus semua">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
    </div>

    <!-- Input bar -->
    <div class="input-bar">
        <label class="attach-btn" for="file-input" title="Lampirkan gambar / video bukti">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41A2 2 0 0 1 6.59 14.59l8.49-8.48"/>
            </svg>
            <input type="file" id="file-input" accept="image/*,video/*" multiple style="display:none">
        </label>
        <textarea id="msg-input" placeholder="Ketik pesan..." rows="1" maxlength="500"></textarea>
        <button class="send-btn" id="send-btn" aria-label="Kirim">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </div>

</div>

<!-- REPORT MODAL -->
<div class="modal-bg" id="modal-bg">
    <div class="modal-card">
        <div class="modal-header">
            <div class="modal-icon bug" id="modal-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <span class="modal-title-text" id="modal-title">Laporan Bug / Error</span>
            <button class="modal-close" id="btn-close-modal">✕</button>
        </div>

        <div class="type-toggle">
            <button class="type-btn active" data-type="bug">Bug / Error</button>
            <button class="type-btn" data-type="saran">Saran</button>
        </div>

        <div id="modal-form">
            <div class="field">
                <label>Game yang bermasalah</label>
                <select id="r-game">
                    <option value="">-- Pilih game --</option>
                    <option>Minecraft Parkun 2D</option>
                    <option>THE ONE FOR ZOMBIE</option>
                    <option>Desa Investasi Zombie</option>
                    <option>Gerbang Parkun 2D</option>
                    <option>Desa Cipta Karya Ch 2</option>
                    <option>The Undeads (Roblox)</option>
                    <option>Frequency Fury Obby (Roblox)</option>
                    <option>Lainnya / Umum</option>
                </select>
            </div>
            <div class="field">
                <label id="r-desc-label">Deskripsi bug / error *</label>
                <textarea id="r-desc" rows="4" placeholder="Ceritakan bug yang kamu temukan..." maxlength="1000"></textarea>
            </div>
            <div class="field">
                <label>Bukti (gambar / video)</label>
                <div class="modal-upload-area" id="modal-upload-area">
                    <label for="modal-file-input" class="modal-upload-label">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41A2 2 0 0 1 6.59 14.59l8.49-8.48"/></svg>
                        <span>Pilih gambar / video (opsional)</span>
                        <input type="file" id="modal-file-input" accept="image/*,video/*" multiple style="display:none">
                    </label>
                    <div class="modal-upload-preview" id="modal-upload-preview"></div>
                </div>
            </div>
            <div class="field">
                <label>Email kamu <span style="color:var(--muted);font-weight:400;">(untuk konfirmasi tiket)</span></label>
                <input type="email" id="r-email" placeholder="contoh@gmail.com">
            </div>
            <div class="field">
                <label>Kontak lain <span style="color:var(--muted);font-weight:400;">(opsional — WA / Discord)</span></label>
                <input type="text" id="r-contact" placeholder="WA / Discord...">
            </div>
            <button class="submit-btn" id="r-submit">Kirim Laporan Bug</button>
        </div>

        <div class="modal-success" id="modal-success">
            <div class="success-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <span class="success-title" id="success-title">Laporan Terkirim!</span>
            <span class="success-msg" id="success-msg">Terima kasih! Tim kami akan segera menangani laporanmu.</span>
            <div class="ticket-box" id="ticket-box" style="display:none">
                <span class="ticket-label">Nomor Tiket</span>
                <span class="ticket-number" id="ticket-number">#GS-000000</span>
                <span class="ticket-note" id="ticket-note">Konfirmasi dikirim ke email kamu</span>
            </div>
        </div>
    </div>
</div>

<script src="script.js" defer></script>
</body>
</html>
