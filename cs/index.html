<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Service — Grid Survival</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
        --brand:      #6c63ff;
        --brand-2:    #48bfe3;
        --brand-dark: #4b44cc;
        --green:      #22c55e;
        --red:        #ef4444;
        --yellow:     #f59e0b;
        --bg:         #f5f4ff;
        --surface:    #ffffff;
        --surface2:   #f0efff;
        --border:     #e4e2ff;
        --text:       #1a1535;
        --muted:      #7b7a9d;
        --bot-bubble: #ffffff;
        --user-bubble:#6c63ff;
        --shadow:     0 4px 24px rgba(108,99,255,0.10);
        --shadow-lg:  0 8px 40px rgba(108,99,255,0.18);
    }

    html, body { height: 100%; }

    body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        /* Subtle mesh background */
        background-image:
            radial-gradient(ellipse at 20% 20%, rgba(108,99,255,0.12) 0%, transparent 60%),
            radial-gradient(ellipse at 80% 80%, rgba(72,191,227,0.10) 0%, transparent 60%),
            radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.4) 0%, transparent 100%);
    }

    /* ── TOP BAR ── */
    .topbar {
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        padding: 0 20px;
        height: 64px;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-shrink: 0;
        position: relative;
        z-index: 10;
        box-shadow: 0 1px 20px rgba(108,99,255,0.08);
    }

    .topbar-back {
        width: 36px; height: 36px;
        border: none;
        background: var(--surface2);
        border-radius: 10px;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        color: var(--brand);
        font-size: 1.1em;
        transition: background 0.15s, transform 0.15s;
        text-decoration: none;
        flex-shrink: 0;
    }
    .topbar-back:hover { background: var(--border); transform: scale(1.05); }

    .topbar-avatar {
        width: 40px; height: 40px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--brand), var(--brand-2));
        display: flex; align-items: center; justify-content: center;
        overflow: hidden;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(108,99,255,0.3);
    }
    .topbar-avatar img {
        width: 100%; height: 100%;
        object-fit: contain;
        padding: 4px;
    }

    .topbar-info { flex: 1; min-width: 0; }
    .topbar-name {
        font-family: 'Sora', sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--text);
        display: block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .topbar-status {
        font-size: 0.78rem;
        color: var(--green);
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .status-dot {
        width: 7px; height: 7px;
        background: var(--green);
        border-radius: 50%;
        animation: pulse 2s infinite;
    }

    .topbar-actions { display: flex; gap: 8px; align-items: center; }
    .topbar-btn {
        width: 36px; height: 36px;
        border: none;
        background: var(--surface2);
        border-radius: 10px;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        color: var(--muted);
        font-size: 1rem;
        transition: background 0.15s, color 0.15s;
    }
    .topbar-btn:hover { background: var(--border); color: var(--brand); }

    /* ── CHAT AREA ── */
    .chat-wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: 720px;
        width: 100%;
        margin: 0 auto;
        padding: 0 16px;
        min-height: 0;
    }

    .messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px 0 12px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
    }

    /* Date separator */
    .date-sep {
        text-align: center;
        font-size: 0.72rem;
        color: var(--muted);
        font-weight: 500;
        letter-spacing: 0.5px;
        position: relative;
    }
    .date-sep::before, .date-sep::after {
        content: '';
        position: absolute;
        top: 50%; width: 30%;
        height: 1px;
        background: var(--border);
    }
    .date-sep::before { left: 0; }
    .date-sep::after  { right: 0; }

    /* Message row */
    .msg-row {
        display: flex;
        gap: 10px;
        align-items: flex-end;
        animation: msgSlide 0.3s ease-out both;
    }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
        width: 32px; height: 32px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--brand), var(--brand-2));
        display: flex; align-items: center; justify-content: center;
        overflow: hidden;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(108,99,255,0.2);
    }
    .msg-avatar img {
        width: 100%; height: 100%;
        object-fit: contain;
        padding: 3px;
    }
    .msg-row.user .msg-avatar { display: none; }

    .msg-content { max-width: 72%; display: flex; flex-direction: column; gap: 4px; }
    .msg-row.user .msg-content { align-items: flex-end; }

    .msg-name {
        font-size: 0.72rem;
        color: var(--muted);
        font-weight: 600;
        padding: 0 4px;
    }

    .msg-bubble {
        padding: 12px 16px;
        border-radius: 18px;
        font-size: 0.92rem;
        line-height: 1.6;
        word-break: break-word;
        box-shadow: var(--shadow);
        position: relative;
    }
    .msg-row.bot .msg-bubble {
        background: var(--bot-bubble);
        color: var(--text);
        border-bottom-left-radius: 4px;
        border: 1px solid var(--border);
    }
    .msg-row.user .msg-bubble {
        background: linear-gradient(135deg, var(--brand), var(--brand-dark));
        color: #fff;
        border-bottom-right-radius: 4px;
    }

    .msg-time {
        font-size: 0.7rem;
        color: var(--muted);
        padding: 0 4px;
    }

    /* Typing indicator */
    .typing-row { display: flex; gap: 10px; align-items: flex-end; }
    .typing-bubble {
        background: var(--bot-bubble);
        border: 1px solid var(--border);
        border-radius: 18px;
        border-bottom-left-radius: 4px;
        padding: 14px 18px;
        display: flex;
        gap: 5px;
        align-items: center;
        box-shadow: var(--shadow);
    }
    .typing-bubble span {
        width: 7px; height: 7px;
        background: var(--muted);
        border-radius: 50%;
        animation: typDot 1.2s ease-in-out infinite;
        opacity: 0.5;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    /* Quick replies */
    .quick-section {
        padding: 0 0 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }
    .quick-chip {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: 20px;
        padding: 7px 14px;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--brand);
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        font-family: 'Plus Jakarta Sans', sans-serif;
        box-shadow: 0 2px 8px rgba(108,99,255,0.06);
    }
    .quick-chip:hover {
        background: var(--brand);
        color: #fff;
        border-color: var(--brand);
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(108,99,255,0.25);
    }

    /* ── REPORT CARDS ── */
    .report-cards {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding: 4px 0 12px;
    }
    .report-card {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        box-shadow: var(--shadow);
    }
    .report-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
        border-color: var(--brand);
    }
    .report-card-icon { font-size: 1.6em; display: block; margin-bottom: 6px; }
    .report-card-label {
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--text);
        display: block;
    }
    .report-card-sub {
        font-size: 0.72rem;
        color: var(--muted);
        display: block;
        margin-top: 2px;
    }

    /* ── INPUT BAR ── */
    .input-bar {
        background: rgba(255,255,255,0.9);
        backdrop-filter: blur(20px);
        border-top: 1px solid var(--border);
        padding: 12px 16px 16px;
        display: flex;
        gap: 10px;
        align-items: flex-end;
        flex-shrink: 0;
    }
    .input-bar textarea {
        flex: 1;
        background: var(--surface2);
        border: 1.5px solid var(--border);
        border-radius: 16px;
        padding: 11px 16px;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 0.9rem;
        color: var(--text);
        outline: none;
        resize: none;
        min-height: 44px;
        max-height: 120px;
        line-height: 1.5;
        transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input-bar textarea:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 3px rgba(108,99,255,0.12);
    }
    .input-bar textarea::placeholder { color: var(--muted); }

    .send-btn {
        width: 44px; height: 44px;
        background: linear-gradient(135deg, var(--brand), var(--brand-dark));
        border: none;
        border-radius: 14px;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        color: #fff;
        font-size: 1.1em;
        flex-shrink: 0;
        transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
        box-shadow: 0 4px 14px rgba(108,99,255,0.35);
    }
    .send-btn:hover { transform: scale(1.07); box-shadow: 0 6px 20px rgba(108,99,255,0.45); }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── REPORT MODAL ── */
    .modal-bg {
        position: fixed; inset: 0;
        background: rgba(26,21,53,0.6);
        backdrop-filter: blur(6px);
        z-index: 500;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    .modal-bg.open { display: flex; }

    .modal-card {
        background: var(--surface);
        border-radius: 24px;
        padding: 28px;
        width: 100%;
        max-width: 460px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 20px 60px rgba(108,99,255,0.2);
        animation: modalPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .modal-card::-webkit-scrollbar { width: 4px; }
    .modal-card::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .modal-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
    }
    .modal-icon {
        width: 44px; height: 44px;
        border-radius: 13px;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.4em;
        flex-shrink: 0;
    }
    .modal-icon.bug   { background: #fef2f2; }
    .modal-icon.saran { background: #fefce8; }
    .modal-title-text {
        font-family: 'Sora', sans-serif;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text);
    }
    .modal-close {
        margin-left: auto;
        width: 32px; height: 32px;
        border: none;
        background: var(--surface2);
        border-radius: 9px;
        cursor: pointer;
        color: var(--muted);
        font-size: 1em;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.15s, color 0.15s;
    }
    .modal-close:hover { background: #fef2f2; color: var(--red); }

    /* Type toggle */
    .type-toggle {
        display: flex;
        background: var(--surface2);
        border-radius: 12px;
        padding: 4px;
        gap: 4px;
        margin-bottom: 20px;
    }
    .type-btn {
        flex: 1;
        padding: 9px;
        border: none;
        border-radius: 9px;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        background: transparent;
        color: var(--muted);
        transition: all 0.2s;
    }
    .type-btn.active {
        background: var(--surface);
        color: var(--brand);
        box-shadow: var(--shadow);
    }

    /* Form fields */
    .field { margin-bottom: 16px; }
    .field label {
        display: block;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 7px;
    }
    .field select,
    .field input,
    .field textarea {
        width: 100%;
        background: var(--surface2);
        border: 1.5px solid var(--border);
        border-radius: 12px;
        padding: 11px 14px;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 0.9rem;
        color: var(--text);
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
        resize: vertical;
        appearance: none;
    }
    .field select:focus,
    .field input:focus,
    .field textarea:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 3px rgba(108,99,255,0.12);
    }
    .field select option { background: white; }

    .submit-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--brand), var(--brand-dark));
        border: none;
        border-radius: 14px;
        color: #fff;
        font-family: 'Sora', sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
        box-shadow: 0 4px 16px rgba(108,99,255,0.3);
        margin-top: 6px;
        letter-spacing: 0.3px;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(108,99,255,0.4); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Success state */
    .modal-success {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 20px 0 8px;
        text-align: center;
    }
    .modal-success.show { display: flex; }
    .success-icon {
        width: 64px; height: 64px;
        border-radius: 20px;
        background: linear-gradient(135deg, #dcfce7, #bbf7d0);
        display: flex; align-items: center; justify-content: center;
        font-size: 1.8em;
    }
    .success-title {
        font-family: 'Sora', sans-serif;
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--text);
    }
    .success-msg { font-size: 0.87rem; color: var(--muted); line-height: 1.6; }

    /* ── ANIMATIONS ── */
    @keyframes msgSlide {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes typDot {
        0%, 100% { transform: translateY(0); opacity: 0.4; }
        50%       { transform: translateY(-4px); opacity: 1; }
    }
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.5; }
    }
    @keyframes modalPop {
        from { opacity: 0; transform: scale(0.92) translateY(20px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 500px) {
        .report-cards { grid-template-columns: 1fr 1fr; gap: 8px; }
        .modal-card { padding: 20px; border-radius: 20px; }
    }
    </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
    <a href="../" class="topbar-back" aria-label="Kembali">←</a>
    <div class="topbar-avatar">
        <img src="../assets/img/studio_logo.png" alt="Grid Survival CS">
    </div>
    <div class="topbar-info">
        <span class="topbar-name">Grid CS Bot</span>
        <span class="topbar-status">
            <span class="status-dot"></span>
            Online · Siap membantu
        </span>
    </div>
    <div class="topbar-actions">
        <button class="topbar-btn" id="btn-report-top" title="Lapor Bug / Saran">🐛</button>
    </div>
</div>

<!-- CHAT -->
<div class="chat-wrap">
    <div class="messages" id="messages">
        <div class="date-sep">Hari ini</div>
    </div>

    <!-- Quick replies + report cards (shown at start) -->
    <div id="quick-area">
        <div class="quick-section" id="quick-chips"></div>
        <div class="report-cards" id="report-cards-area">
            <div class="report-card" onclick="openModal('bug')">
                <span class="report-card-icon">🐛</span>
                <span class="report-card-label">Lapor Bug</span>
                <span class="report-card-sub">Ada error di game?</span>
            </div>
            <div class="report-card" onclick="openModal('saran')">
                <span class="report-card-icon">💡</span>
                <span class="report-card-label">Kirim Saran</span>
                <span class="report-card-sub">Punya ide keren?</span>
            </div>
        </div>
    </div>
</div>

<!-- INPUT BAR -->
<div class="input-bar">
    <textarea id="msg-input" placeholder="Ketik pesan..." rows="1" maxlength="500"></textarea>
    <button class="send-btn" id="send-btn" aria-label="Kirim">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
    </button>
</div>

<!-- REPORT MODAL -->
<div class="modal-bg" id="modal-bg">
    <div class="modal-card" id="modal-card">
        <div class="modal-header">
            <div class="modal-icon bug" id="modal-icon">🐛</div>
            <span class="modal-title-text" id="modal-title">Laporan Bug / Error</span>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>

        <div class="type-toggle">
            <button class="type-btn active" data-type="bug" onclick="switchType('bug')">🐛 Bug / Error</button>
            <button class="type-btn" data-type="saran" onclick="switchType('saran')">💡 Saran</button>
        </div>

        <div id="modal-form">
            <div class="field">
                <label>Game yang bermasalah</label>
                <select id="r-game">
                    <option value="">-- Pilih game --</option>
                    <option>Minecraft Parkun 2D</option>
                    <option>THE ONE FOR ZOMBIE</option>
                    <option>Desa Investasi Zombie</option>
                    <option>Gerbang Parkun 2D</option>
                    <option>Desa Cipta Karya Ch 2</option>
                    <option>The Undeads (Roblox)</option>
                    <option>Frequency Fury Obby (Roblox)</option>
                    <option>Lainnya / Umum</option>
                </select>
            </div>
            <div class="field">
                <label id="r-desc-label">Deskripsi bug / error *</label>
                <textarea id="r-desc" rows="4" placeholder="Ceritakan bug yang kamu temukan..." maxlength="1000"></textarea>
            </div>
            <div class="field">
                <label>Kontak kamu <span style="color:var(--muted);font-weight:400;">(opsional)</span></label>
                <input type="text" id="r-contact" placeholder="WA / Discord / Email...">
            </div>
            <button class="submit-btn" id="r-submit" onclick="submitReport()">Kirim Laporan</button>
        </div>

        <div class="modal-success" id="modal-success">
            <div class="success-icon">✅</div>
            <span class="success-title" id="success-title">Laporan Terkirim!</span>
            <span class="success-msg" id="success-msg">Terima kasih! Tim kami akan segera menangani laporanmu.</span>
        </div>
    </div>
</div>

<script>
'use strict';

var CS_ENDPOINT     = '/.netlify/functions/cs-chat';
var REPORT_ENDPOINT = '/.netlify/functions/report';
var currentType     = 'bug';
var chatHistory     = [];
var isWaiting       = false;
var sessionId       = 'cs_' + Math.random().toString(36).slice(2, 9);

var GAMES = ['Minecraft Parkun 2D','THE ONE FOR ZOMBIE','Desa Investasi Zombie',
             'Gerbang Parkun 2D','Desa Cipta Karya Ch 2','The Undeads (Roblox)',
             'Frequency Fury Obby (Roblox)'];

var QUICK = [
    { label: '🎮 Info game apa saja?', text: 'Ceritain dong game-game dari Grid Survival!' },
    { label: '📥 Cara download game', text: 'Gimana cara download game kalian?' },
    { label: '📞 Kontak tim',          text: 'Gimana cara menghubungi tim Grid Survival?' },
    { label: '🤔 Siapa Grid Survival?', text: 'Ceritain dong tentang studio Grid Survival!' },
];

/* ─── TIME ─── */
function now() {
    return new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
}

/* ─── RENDER MSG ─── */
function addMsg(role, text, time) {
    var msgs = document.getElementById('messages');
    var row  = document.createElement('div');
    row.className = 'msg-row ' + role;

    var formatted = text
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g,     '<strong>$1</strong>')
        .replace(/\n/g, '<br>');

    var avatarHtml = role === 'bot'
        ? '<div class="msg-avatar"><img src="../assets/img/studio_logo.png" alt="CS"></div>'
        : '';

    var nameHtml = role === 'bot'
        ? '<div class="msg-name">Grid CS Bot</div>'
        : '<div class="msg-name">Kamu</div>';

    row.innerHTML =
        avatarHtml +
        '<div class="msg-content">' +
            nameHtml +
            '<div class="msg-bubble">' + formatted + '</div>' +
            '<div class="msg-time">' + (time || now()) + '</div>' +
        '</div>';

    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
}

/* ─── TYPING ─── */
function showTyping() {
    var msgs = document.getElementById('messages');
    var row  = document.createElement('div');
    row.className = 'typing-row';
    row.id = 'typing-row';
    row.innerHTML =
        '<div class="msg-avatar"><img src="../assets/img/studio_logo.png" alt="CS"></div>' +
        '<div class="typing-bubble"><span></span><span></span><span></span></div>';
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() {
    var el = document.getElementById('typing-row');
    if (el) el.remove();
}

/* ─── QUICK REPLIES ─── */
function buildQuick() {
    var area = document.getElementById('quick-chips');
    QUICK.forEach(function(q) {
        var btn = document.createElement('button');
        btn.className   = 'quick-chip';
        btn.textContent = q.label;
        btn.onclick = function() {
            sendMsg(q.text);
            hideQuickArea();
        };
        area.appendChild(btn);
    });
}
function hideQuickArea() {
    var qa = document.getElementById('quick-area');
    if (qa) { qa.style.display = 'none'; }
}

/* ─── WELCOME ─── */
function sendWelcome() {
    setTimeout(function() {
        addMsg('bot', 'Halo! 👋 Selamat datang di <strong>Customer Service Grid Survival</strong>.\n\nAda yang bisa aku bantu? Kamu bisa tanya info game, cara download, atau lapor bug/saran langsung di sini! 🎮', now());
    }, 600);
}

/* ─── SEND ─── */
function sendMsg(text) {
    if (!text || !text.trim() || isWaiting) return;
    text = text.trim();

    addMsg('user', text, now());
    chatHistory.push({ role: 'user', text: text });

    var inp = document.getElementById('msg-input');
    if (inp) { inp.value = ''; inp.style.height = 'auto'; }

    isWaiting = true;
    document.getElementById('send-btn').disabled = true;
    showTyping();

    fetch(CS_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            text: text,
            from: 'Pengunjung Web',
            userId: sessionId,
            history: chatHistory.slice(-8).map(function(h) {
                return { role: h.role === 'bot' ? 'model' : 'user', text: h.text };
            })
        })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        hideTyping();
        isWaiting = false;
        document.getElementById('send-btn').disabled = false;
        if (data.rateLimited) {
            addMsg('bot', 'Sabar ya, tunggu beberapa detik sebelum kirim pesan lagi 😊', now());
            return;
        }
        var reply = (data.reply || 'Maaf, coba lagi ya!').trim();
        addMsg('bot', reply, now());
        chatHistory.push({ role: 'bot', text: reply });
        if (chatHistory.length > 16) chatHistory = chatHistory.slice(-16);
    })
    .catch(function() {
        hideTyping();
        isWaiting = false;
        document.getElementById('send-btn').disabled = false;
        addMsg('bot', 'Koneksi bermasalah. Coba refresh halaman atau hubungi kami via Discord/Email ya! 🙏', now());
    });
}

/* ─── INPUT ─── */
function initInput() {
    var inp  = document.getElementById('msg-input');
    var btn  = document.getElementById('send-btn');
    btn.addEventListener('click', function() { sendMsg(inp.value); hideQuickArea(); });
    inp.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMsg(inp.value);
            hideQuickArea();
        }
    });
    inp.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
}

/* ─── REPORT MODAL ─── */
function openModal(type) {
    currentType = type || 'bug';
    switchType(currentType);
    document.getElementById('modal-form').style.display = 'block';
    document.getElementById('modal-success').classList.remove('show');
    document.getElementById('r-desc').value    = '';
    document.getElementById('r-contact').value = '';
    document.getElementById('r-game').value    = '';
    document.getElementById('r-submit').disabled    = false;
    document.getElementById('r-submit').textContent = 'Kirim Laporan';
    document.getElementById('modal-bg').classList.add('open');
}
function closeModal() {
    document.getElementById('modal-bg').classList.remove('open');
}
function switchType(type) {
    currentType = type;
    document.querySelectorAll('.type-btn').forEach(function(b) {
        b.classList.toggle('active', b.getAttribute('data-type') === type);
    });
    var isBug = type === 'bug';
    document.getElementById('modal-icon').textContent       = isBug ? '🐛' : '💡';
    document.getElementById('modal-icon').className         = 'modal-icon ' + type;
    document.getElementById('modal-title').textContent      = isBug ? 'Laporan Bug / Error' : 'Kirim Saran';
    document.getElementById('r-desc-label').textContent     = isBug ? 'Deskripsi bug / error *' : 'Isi saran / masukan *';
    document.getElementById('r-desc').placeholder           = isBug
        ? 'Ceritakan bug yang kamu temukan, langkah reproduksi, dan apa yang terjadi...'
        : 'Tulis saran atau masukan kamu untuk game Grid Survival...';
    document.getElementById('r-submit').textContent = isBug ? 'Kirim Laporan Bug' : 'Kirim Saran';
}

document.getElementById('modal-bg').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
document.getElementById('btn-report-top').addEventListener('click', function() { openModal('bug'); });

function submitReport() {
    var desc    = document.getElementById('r-desc').value.trim();
    var game    = document.getElementById('r-game').value;
    var contact = document.getElementById('r-contact').value.trim();
    var btn     = document.getElementById('r-submit');

    if (!desc || desc.length < 10) {
        document.getElementById('r-desc').focus();
        document.getElementById('r-desc').style.borderColor = '#ef4444';
        document.getElementById('r-desc').style.boxShadow   = '0 0 0 3px rgba(239,68,68,0.15)';
        setTimeout(function() {
            document.getElementById('r-desc').style.borderColor = '';
            document.getElementById('r-desc').style.boxShadow   = '';
        }, 2000);
        return;
    }

    btn.disabled    = true;
    btn.textContent = 'Mengirim...';

    fetch(REPORT_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: currentType, game: game, desc: desc, contact: contact })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        saveReportLocal({ id: Date.now(), type: currentType, game: game||'—', desc: desc, contact: contact, summary: data.summary||desc, time: new Date().toLocaleString('id-ID'), done: false });
        showSuccess(data.ok);
    })
    .catch(function() {
        saveReportLocal({ id: Date.now(), type: currentType, game: game||'—', desc: desc, contact: contact, summary: desc, time: new Date().toLocaleString('id-ID'), done: false, offline: true });
        showSuccess(false, true);
    });
}

function showSuccess(ok, offline) {
    document.getElementById('modal-form').style.display = 'none';
    var s = document.getElementById('modal-success');
    s.classList.add('show');
    if (ok) {
        document.querySelector('.success-icon').textContent   = currentType === 'bug' ? '✅' : '💡';
        document.getElementById('success-title').textContent = currentType === 'bug' ? 'Bug Dilaporkan!' : 'Saran Terkirim!';
        document.getElementById('success-msg').textContent   = 'Terima kasih! Tim kami akan segera menangani laporanmu.';
    } else if (offline) {
        document.querySelector('.success-icon').textContent   = '📦';
        document.getElementById('success-title').textContent  = 'Tersimpan Lokal';
        document.getElementById('success-msg').textContent    = 'Laporan tersimpan. Koneksi server bermasalah saat ini.';
    } else {
        document.querySelector('.success-icon').textContent   = '⚠️';
        document.getElementById('success-title').textContent  = 'Gagal Mengirim';
        document.getElementById('success-msg').textContent    = 'Coba lagi nanti atau hubungi kami via Discord.';
    }
    setTimeout(closeModal, 3000);
}

function saveReportLocal(r) {
    try {
        var all = JSON.parse(localStorage.getItem('gs_reports') || '[]');
        all.unshift(r);
        localStorage.setItem('gs_reports', JSON.stringify(all.slice(0, 100)));
    } catch(e) {}
}

/* ─── INIT ─── */
buildQuick();
initInput();
sendWelcome();
</script>
</body>
</html>
