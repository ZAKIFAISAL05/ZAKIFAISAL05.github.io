<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Status Tiket — Grid Survival</title>
    <style>
        :root {
            --bg: #0a0a14;
            --card: #12121f;
            --border: #1e1e30;
            --accent: #7c4dff;
            --accent2: #00e5ff;
            --green: #27ae60;
            --yellow: #f39c12;
            --red: #e74c3c;
            --text: #e0e0e0;
            --muted: #666;
            --radius: 14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 24px 16px 48px;
        }

        /* ── HEADER ── */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 540px;
            margin-bottom: 28px;
        }
        .header a {
            color: var(--muted);
            text-decoration: none;
            font-size: 1.3rem;
            transition: color .2s;
        }
        .header a:hover { color: var(--text); }
        .header-logo {
            width: 36px; height: 36px; border-radius: 8px;
            object-fit: cover;
        }
        .header-title { font-size: 1rem; font-weight: 700; color: var(--text); }
        .header-sub { font-size: 0.75rem; color: var(--muted); }

        /* ── CARD ── */
        .ticket-card {
            width: 100%; max-width: 540px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .ticket-header {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            padding: 22px 24px;
        }
        .ticket-num {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.75);
            display: block;
            margin-bottom: 6px;
        }
        .ticket-id {
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
        }
        .ticket-type-badge {
            display: inline-block;
            margin-top: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 0.78rem;
            color: #fff;
            font-weight: 600;
        }

        /* ── STATUS BAR ── */
        .status-section {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }
        .status-title {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 18px;
        }

        .steps {
            display: flex;
            align-items: flex-start;
            gap: 0;
            position: relative;
        }
        .step {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        /* connector line */
        .step:not(:last-child)::after {
            content: '';
            position: absolute;
            top: 14px;
            left: 50%;
            width: 100%;
            height: 2px;
            background: var(--border);
            z-index: 0;
            transition: background .5s;
        }
        .step.done:not(:last-child)::after { background: var(--accent); }

        .step-dot {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--muted);
            position: relative;
            z-index: 1;
            transition: all .4s;
        }
        .step.done .step-dot {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .step.active .step-dot {
            background: var(--bg);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124,77,255,.2);
        }
        .step.pulse .step-dot {
            animation: pulseDot 1.5s ease-in-out infinite;
        }
        @keyframes pulseDot {
            0%,100% { box-shadow: 0 0 0 3px rgba(124,77,255,.2); }
            50%      { box-shadow: 0 0 0 7px rgba(124,77,255,.05); }
        }

        .step-label {
            margin-top: 8px;
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--muted);
            text-align: center;
            line-height: 1.3;
            transition: color .4s;
        }
        .step.done .step-label,
        .step.active .step-label { color: var(--text); }

        /* done = selesai → warna hijau */
        .steps.is-done .step.done .step-dot { background: var(--green); border-color: var(--green); }
        .steps.is-done .step.done::after    { background: var(--green); }

        /* ── STATUS NOTE ── */
        .status-note {
            margin-top: 18px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.82rem;
            line-height: 1.5;
        }
        .status-note.received  { background: rgba(124,77,255,.1); border-left: 3px solid var(--accent); }
        .status-note.seen      { background: rgba(0,229,255,.08); border-left: 3px solid var(--accent2); }
        .status-note.confirmed { background: rgba(243,156,18,.08); border-left: 3px solid var(--yellow); }
        .status-note.done      { background: rgba(39,174,96,.1); border-left: 3px solid var(--green); }

        .dev-note {
            margin-top: 10px;
            padding: 10px 14px;
            background: rgba(255,255,255,.04);
            border-radius: 8px;
            font-size: 0.8rem;
            color: var(--text);
            line-height: 1.5;
        }
        .dev-note-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); display: block; margin-bottom: 4px; }

        /* ── DETAIL ── */
        .ticket-detail { padding: 22px 24px; }
        .field { margin-bottom: 14px; }
        .field label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .field p {
            font-size: 0.88rem;
            line-height: 1.5;
            color: var(--text);
        }
        .field-row { display: flex; gap: 16px; }
        .field-row .field { flex: 1; }

        /* ── EXPIRED ── */
        .expired-wrap {
            text-align: center;
            padding: 40px 24px;
        }
        .expired-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .expired-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; color: var(--green); }
        .expired-msg { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }

        /* ── ERROR ── */
        .error-wrap { text-align: center; padding: 40px 24px; }
        .error-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .error-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; color: var(--red); }
        .error-msg { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
        .error-link { color: var(--accent); text-decoration: none; }
        .error-link:hover { text-decoration: underline; }

        /* ── LOADING ── */
        .loading-wrap { text-align: center; padding: 60px 24px; }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── REFRESH HINT ── */
        .refresh-hint {
            margin-top: 12px;
            font-size: 0.72rem;
            color: var(--muted);
            text-align: center;
        }
        .refresh-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.75rem;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all .2s;
            margin-top: 8px;
        }
        .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

        .timestamp { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
    </style>
</head>
<body>

<div class="header">
    <a href="../" title="Kembali">←</a>
    <img src="../assets/img/studio_logo.png" alt="Grid Survival" class="header-logo">
    <div>
        <div class="header-title">Grid Survival</div>
        <div class="header-sub">Status Tiket Laporan</div>
    </div>
</div>

<div class="ticket-card" id="ticket-card">
    <div class="loading-wrap">
        <div class="spinner"></div>
        <div style="color:var(--muted);font-size:.85rem;">Memuat tiket...</div>
    </div>
</div>

<div class="refresh-hint" id="refresh-wrap" style="display:none;">
    <div>Status diperbarui oleh developer</div>
    <button class="refresh-btn" onclick="loadTicket()">↺ Refresh status</button>
</div>

<script>
'use strict';

const TICKET_API = '/.netlify/functions/ticket';

const STEP_LABELS = ['Diterima', 'Dilihat', 'Dikonfirmasi', 'Selesai'];
const STATUS_NOTE = {
    received:  '📥 Laporanmu sudah kami terima! Tim developer akan segera meninjau.',
    seen:      '👀 Developer sudah melihat laporanmu dan sedang dipelajari.',
    confirmed: '🔧 Laporan dikonfirmasi! Developer sedang mengerjakan perbaikan / tindak lanjut.',
    done:      '✅ Masalah sudah diselesaikan! Terima kasih sudah melaporkan. Tiket ini sekarang ditutup.',
};

function getToken() {
    const params = new URLSearchParams(window.location.search);
    return params.get('token');
}

function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString('id-ID', {
        day:'2-digit', month:'long', year:'numeric',
        hour:'2-digit', minute:'2-digit', timeZone:'Asia/Jakarta'
    });
}

function renderSteps(step, isDone) {
    return `
    <div class="steps${isDone ? ' is-done' : ''}">
        ${STEP_LABELS.map((label, i) => {
            let cls = '';
            if (i < step) cls = 'done';
            else if (i === step) cls = isDone ? 'done' : 'active pulse';
            return `<div class="step ${cls}">
                <div class="step-dot">${i < step || isDone ? '✓' : (i + 1)}</div>
                <div class="step-label">${label}</div>
            </div>`;
        }).join('')}
    </div>`;
}

function renderTicket(ticket) {
    const card   = document.getElementById('ticket-card');
    const typeLabel = ticket.type === 'bug' ? '🐛 Laporan Bug' : '💡 Saran';
    const step   = ticket.statusStep ?? 0;
    const isDone = ticket.done || ticket.status === 'done';

    card.innerHTML = `
        <div class="ticket-header">
            <span class="ticket-num">Tiket #${ticket.num}</span>
            <div class="ticket-id">${ticket.id}</div>
            <span class="ticket-type-badge">${typeLabel}</span>
        </div>

        <div class="status-section">
            <div class="status-title">Progress Penanganan</div>
            ${renderSteps(step, isDone)}
            <div class="status-note ${ticket.status}">
                ${STATUS_NOTE[ticket.status] || 'Status tidak dikenali.'}
            </div>
            ${ticket.devNote ? `<div class="dev-note"><span class="dev-note-label">Catatan Developer</span>${ticket.devNote}</div>` : ''}
        </div>

        <div class="ticket-detail">
            <div class="field-row">
                <div class="field">
                    <label>Game</label>
                    <p>${ticket.game || '—'}</p>
                </div>
                <div class="field">
                    <label>Dibuat</label>
                    <p class="timestamp">${formatDate(ticket.createdAt)}</p>
                </div>
            </div>
            <div class="field">
                <label>Deskripsi Laporan</label>
                <p>${ticket.desc ? ticket.desc.replace(/\n/g,'<br>') : '—'}</p>
            </div>
            ${ticket.updatedAt && ticket.updatedAt !== ticket.createdAt ? `
            <div class="field">
                <label>Terakhir Diperbarui</label>
                <p class="timestamp">${formatDate(ticket.updatedAt)}</p>
            </div>` : ''}
        </div>
    `;

    document.getElementById('refresh-wrap').style.display = isDone ? 'none' : 'block';
}

function renderExpired(num) {
    document.getElementById('ticket-card').innerHTML = `
        <div class="expired-wrap">
            <div class="expired-icon">🎉</div>
            <div class="expired-title">Tiket #${num} — Selesai!</div>
            <div class="expired-msg">
                Masalah pada tiket ini sudah diselesaikan oleh developer.<br>
                Tiket telah ditutup. Terima kasih atas laporanmu!
            </div>
        </div>`;
    document.getElementById('refresh-wrap').style.display = 'none';
}

function renderError(msg) {
    document.getElementById('ticket-card').innerHTML = `
        <div class="error-wrap">
            <div class="error-icon">🔒</div>
            <div class="error-title">Tiket Tidak Ditemukan</div>
            <div class="error-msg">
                ${msg || 'Token tidak valid atau tiket tidak ditemukan.'}<br><br>
                Pastikan kamu menggunakan link yang dikirim saat laporan dibuat.
            </div>
            <div class="manual-input-area">
                <p class="manual-label">Atau masukkan nomor token tiket kamu:</p>
                <div class="manual-row">
                    <input type="text" id="manual-token-input" class="manual-token-input"
                        placeholder="Contoh: GS-ABC123..." maxlength="80" autocomplete="off" spellcheck="false">
                    <button class="manual-token-btn" onclick="manualCek()">🔍 CEK</button>
                </div>
            </div>
            <a href="../cs/" class="error-link">← Kembali ke Customer Service</a>
        </div>`;
    document.getElementById('refresh-wrap').style.display = 'none';

    // Allow Enter key on manual input
    setTimeout(function() {
        var inp = document.getElementById('manual-token-input');
        if (inp) inp.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') manualCek();
        });
    }, 100);
}

function manualCek() {
    var raw = (document.getElementById('manual-token-input').value || '').trim();
    if (!raw) return;
    var urlMatch = raw.match(/[?&]token=([^&#]+)/);
    var token = urlMatch ? decodeURIComponent(urlMatch[1]) : raw;
    window.location.href = '/tiket/?token=' + encodeURIComponent(token);
}

async function loadTicket() {
    const token = getToken();
    if (!token) { renderError('Tidak ada token tiket di URL ini.'); return; }

    try {
        const res  = await fetch(`${TICKET_API}?token=${encodeURIComponent(token)}`);
        const data = await res.json();

        if (!data.ok) { renderError(data.error); return; }
        if (data.expired) { renderExpired(data.num); return; }
        renderTicket(data.ticket);
    } catch (e) {
        renderError('Gagal terhubung ke server. Coba lagi nanti.');
    }
}

loadTicket();
</script>
</body>
</html>
